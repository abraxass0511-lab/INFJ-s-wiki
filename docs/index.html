<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P-Reinforce — Knowledge Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f7; --bg2: #ffffff; --card: #ffffff; --card-hover: #f0f0f5;
  --border: rgba(0,0,0,0.08); --text: #1a1a2e; --text2: #666680; --muted: #999aaa;
  --purple: #6c4bf4; --blue: #3b8bff; --green: #22c55e; --amber: #f59e0b; --rose: #ef4444;
  --glow-p: rgba(108,75,244,0.06); --glow-b: rgba(59,139,255,0.06);
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* Header */
header {
  padding:20px 28px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border); backdrop-filter:blur(20px);
  position:sticky; top:0; z-index:100; background:rgba(255,255,255,0.92);
}
.logo {
  width:42px; height:42px; background:linear-gradient(135deg,var(--purple),var(--blue));
  border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px;
  box-shadow:0 4px 20px rgba(124,92,245,0.3);
}
.header-left { display:flex; align-items:center; gap:14px; }
.header-left h1 { font-size:20px; font-weight:800; color:var(--text); }
.header-left h1 span { font-size:12px; font-weight:400; display:block; color:var(--text2); }
.status { display:flex; align-items:center; gap:8px; }
.dot { width:8px; height:8px; border-radius:50%; animation:pulse 2s infinite; }
.dot.on { background:var(--green); box-shadow:0 0 8px var(--green); }
.dot.off { background:var(--rose); box-shadow:0 0 8px var(--rose); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.btn { padding:8px 16px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:13px; transition:all .2s; }
.btn:hover { background:var(--card-hover); border-color:rgba(124,92,245,.3); }
.btn-primary { background:linear-gradient(135deg,var(--purple),var(--blue)); border:none; font-weight:600; }
.btn-primary:hover { opacity:.9; transform:translateY(-1px); }

/* Main Layout */
main { display:grid; grid-template-columns:1fr 360px; gap:24px; padding:28px; max-width:1200px; margin:0 auto; }
@media(max-width:900px) { main { grid-template-columns:1fr; } }

/* Calendar */
.cal-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.cal-nav h2 { font-size:18px; font-weight:700; }
.cal-nav button { width:36px; height:36px; border-radius:10px; border:1px solid var(--border); background:var(--bg2); color:var(--text); cursor:pointer; font-size:16px; transition:all .2s; }
.cal-nav button:hover { background:var(--card-hover); border-color:var(--purple); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-day { text-align:center; padding:8px 0; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; }
.cal-cell {
  aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  border-radius:12px; cursor:pointer; font-size:14px; font-weight:500; transition:all .2s; position:relative; padding-top:8px; gap:2px; overflow:hidden;
}
.cal-cell:hover { background:rgba(108,75,244,.08); }
.cal-cell.today { background:rgba(108,75,244,.1); color:var(--purple); font-weight:700; }
.cal-cell.selected { background:var(--purple); color:#fff; box-shadow:0 4px 16px rgba(108,75,244,.3); }
.cal-cell.other { opacity:.25; }
.cat-tags { display:flex; flex-wrap:wrap; gap:1px; justify-content:center; margin-top:2px; max-width:100%; overflow:hidden; }
.cat-tag { font-size:7px; padding:1px 4px; border-radius:3px; font-weight:600; white-space:nowrap; line-height:1.3; }
.cat-ai { background:#dbeafe; color:#2563eb; } .cat-company { background:#dcfce7; color:#16a34a; }
.cat-good { background:#fef3c7; color:#d97706; } .cat-project { background:#ede9fe; color:#7c3aed; }
.cat-daily { background:#fce7f3; color:#db2777; } .cat-etc { background:#f1f5f9; color:#64748b; }

/* Sidebar */
.sidebar { display:flex; flex-direction:column; gap:16px; }
.side-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.side-card h3 { font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:14px; font-weight:600; }
.selected-date { font-size:22px; font-weight:800; font-family:'JetBrains Mono',monospace; color:var(--purple); margin-bottom:4px; }

/* Dropzone */
.dropzone {
  border:2px dashed rgba(108,75,244,.25); border-radius:14px; padding:32px 16px; text-align:center;
  cursor:pointer; transition:all .3s; background:rgba(108,75,244,.02);
}
.dropzone:hover, .dropzone.dragover { border-color:var(--purple); background:rgba(108,75,244,.06); }
.dropzone .icon { font-size:36px; margin-bottom:8px; }
.dropzone p { font-size:13px; color:var(--text2); }
.dropzone input { display:none; }
.cat-select { margin-top:12px; }
.cat-select label { font-size:11px; color:var(--text2); font-weight:600; margin-bottom:6px; display:block; }
.cat-btns { display:flex; flex-wrap:wrap; gap:6px; }
.cat-btn { padding:6px 12px; border-radius:8px; border:1.5px solid var(--border); background:var(--bg); cursor:pointer; font-size:12px; font-weight:500; transition:all .2s; color:var(--text); }
.cat-btn:hover { border-color:var(--purple); }
.cat-btn.active { background:var(--purple); color:#fff; border-color:var(--purple); }

/* File list */
.file-list { display:flex; flex-direction:column; gap:8px; }
.cat-group { margin-top:8px; }
.cat-group-header {
  font-size:11px; font-weight:700; padding:6px 10px; border-radius:8px; margin-bottom:6px;
  display:inline-flex; align-items:center; gap:4px;
}
.cat-group-header.cat-ai { background:#dbeafe; color:#2563eb; }
.cat-group-header.cat-company { background:#dcfce7; color:#16a34a; }
.cat-group-header.cat-good { background:#fef3c7; color:#d97706; }
.cat-group-header.cat-project { background:#ede9fe; color:#7c3aed; }
.cat-group-header.cat-daily { background:#fce7f3; color:#db2777; }
.cat-group-header.cat-etc { background:#f1f5f9; color:#64748b; }
.file-item {
  display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px;
  background:var(--bg); border:1px solid var(--border); font-size:13px;
  cursor:pointer; transition:all .2s;
}
.file-item:hover { background:rgba(124,92,245,.08); border-color:rgba(124,92,245,.2); }
.file-item:active { transform:scale(.98); }
.file-item .thumb { width:36px; height:36px; border-radius:8px; object-fit:cover; background:var(--bg2); }
.file-item .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-item .badge { font-size:10px; padding:2px 8px; border-radius:6px; font-weight:600; }
.badge-img { background:rgba(78,168,255,.15); color:var(--blue); }
.badge-md { background:rgba(52,211,153,.15); color:var(--green); }

/* Preview Modal */
.preview-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(8px);
  z-index:300; align-items:center; justify-content:center; padding:20px;
}
.preview-overlay.active { display:flex; }
.preview-modal {
  background:var(--card); border:1px solid var(--border); border-radius:20px;
  width:95%; max-width:700px; max-height:85vh; display:flex; flex-direction:column;
  animation:modalIn .3s ease; overflow:hidden;
}
.preview-header {
  display:flex; align-items:center; justify-content:space-between; padding:16px 20px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.preview-header h3 { font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; margin-right:12px; }
.preview-close {
  width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:var(--bg2);
  color:var(--text); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center;
  transition:all .2s; flex-shrink:0;
}
.preview-close:hover { background:var(--rose); border-color:var(--rose); color:#fff; }
.preview-body { padding:20px; overflow-y:auto; flex:1; }
.preview-body img { width:100%; height:auto; border-radius:12px; }
.preview-body .md-content {
  font-size:14px; line-height:1.8; color:var(--text); white-space:pre-wrap; word-break:break-word;
  font-family:'JetBrains Mono',monospace;
}
.preview-body .md-content h1,.preview-body .md-content h2,.preview-body .md-content h3 { color:var(--purple); margin:16px 0 8px; }
.preview-body .md-content code { background:var(--bg2); padding:2px 6px; border-radius:4px; font-size:13px; }
.preview-loading { text-align:center; padding:40px; color:var(--muted); font-size:14px; }

/* Toast */
.toast-container { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:8px; }
.toast {
  padding:14px 20px; border-radius:12px; font-size:13px; font-weight:500;
  backdrop-filter:blur(20px); animation:slideIn .3s ease; min-width:280px;
  border:1px solid var(--border); box-shadow:0 8px 32px rgba(0,0,0,.4);
}
.toast-success { background:rgba(52,211,153,.15); border-color:rgba(52,211,153,.3); color:var(--green); }
.toast-error { background:rgba(251,113,133,.15); border-color:rgba(251,113,133,.3); color:var(--rose); }
.toast-info { background:rgba(124,92,245,.15); border-color:rgba(124,92,245,.3); color:var(--purple); }
@keyframes slideIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }

/* Modal */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px);
  z-index:200; align-items:center; justify-content:center;
}
.modal-overlay.active { display:flex; }
.modal {
  background:var(--card); border:1px solid var(--border); border-radius:20px;
  padding:32px; width:90%; max-width:440px; animation:modalIn .3s ease;
}
@keyframes modalIn { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
.modal h2 { font-size:18px; font-weight:700; margin-bottom:20px; }
.modal label { font-size:12px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:6px; margin-top:16px; }
.modal input {
  width:100%; padding:10px 14px; border-radius:10px; border:1px solid var(--border);
  background:var(--bg2); color:var(--text); font-size:14px; font-family:'JetBrains Mono',monospace;
}
.modal input:focus { outline:none; border-color:var(--purple); }
.modal-actions { display:flex; gap:10px; margin-top:24px; justify-content:flex-end; }

/* Upload progress */
.progress-bar { height:4px; background:var(--bg2); border-radius:2px; margin-top:12px; overflow:hidden; display:none; }
.progress-bar.active { display:block; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--purple),var(--blue)); border-radius:2px; width:0; transition:width .3s; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">🧠</div>
    <h1>Knowledge Calendar<span>P-Reinforce — 이미지 업로드 & OCR 자동 문서화</span></h1>
  </div>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText" style="font-size:12px;color:var(--text2)"></span>
    <button class="btn" onclick="openSettings()">⚙️</button>
  </div>
</header>

<main>
  <div class="cal-card">
    <div class="cal-nav">
      <button onclick="prevMonth()">◀</button>
      <h2 id="calTitle"></h2>
      <button onclick="nextMonth()">▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="sidebar">
    <div class="side-card">
      <h3>📅 선택된 날짜</h3>
      <div class="selected-date" id="selDate">날짜를 선택하세요</div>
      <div id="uploadSection" style="display:none;margin-top:16px;">
        <div class="cat-select">
          <label>📂 카테고리</label>
          <div class="cat-btns" id="catBtns"></div>
        </div>
        <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()" style="margin-top:12px;">
          <div class="icon">📸</div>
          <p>이미지를 드래그하거나 클릭하여 업로드</p>
          <input type="file" id="fileInput" accept="image/*" multiple>
        </div>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
    </div>

    <div class="side-card">
      <h3>📁 파일 목록</h3>
      <div class="file-list" id="fileList">
        <p style="font-size:13px;color:var(--muted)">날짜를 선택하면 파일이 표시됩니다</p>
      </div>
    </div>
  </div>
</main>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>⚙️ 설정</h2>
    <label>GitHub Personal Access Token</label>
    <input type="password" id="inputToken" placeholder="ghp_xxxxxxxxxxxx">
    <label>Repository Owner</label>
    <input type="text" id="inputOwner" placeholder="abraxass0511-lab">
    <label>Repository Name</label>
    <input type="text" id="inputRepo" placeholder="INFJ-s-wiki">
    <p style="font-size:11px;color:var(--muted);margin-top:12px;">
      💡 Token은 브라우저 로컬에만 저장됩니다. repo 권한이 필요합니다.<br>
      GitHub → Settings → Developer settings → Personal access tokens
    </p>
    <div class="modal-actions" style="flex-wrap:wrap;">
      <button class="btn" onclick="copyMobileLink()" id="btnCopyLink" style="font-size:12px;">📱 핸드폰 링크 복사</button>
      <div style="flex:1;"></div>
      <button class="btn" onclick="closeSettings()">취소</button>
      <button class="btn btn-primary" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<!-- Preview Modal -->
<div class="preview-overlay" id="previewModal" onclick="if(event.target===this)closePreview()">
  <div class="preview-modal">
    <div class="preview-header">
      <h3 id="previewTitle">파일명</h3>
      <button class="preview-close" onclick="closePreview()">✕</button>
    </div>
    <div class="preview-body" id="previewBody">
      <div class="preview-loading">로딩 중...</div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
// ── Config ──
const CFG = {
  get owner() { return localStorage.getItem('gh_owner') || 'abraxass0511-lab'; },
  get repo()  { return localStorage.getItem('gh_repo')  || 'INFJ-s-wiki'; },
  get token() { return localStorage.getItem('gh_token') || ''; },
  branch: 'main',
  base: '00_Raw'
};

// ── State ──
let curYear, curMonth, selectedDate = null;
const existingDates = new Set();
let categoryData = {}; // { '2026-05-06': ['AI공부'], ... }
let selectedCategory = '';
const CATEGORIES = [
  { key:'AI공부', label:'AI공부', cls:'cat-ai' },
  { key:'회사', label:'회사', cls:'cat-company' },
  { key:'좋은글', label:'좋은글', cls:'cat-good' },
  { key:'프로젝트', label:'프로젝트', cls:'cat-project' },
  { key:'일상', label:'일상', cls:'cat-daily' },
  { key:'기타', label:'기타', cls:'cat-etc' }
];

// ── URL 파라미터로 자동 토큰 설정 ──
function autoSetupFromURL() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const owner = params.get('owner');
  const repo = params.get('repo');
  let changed = false;
  if (token && !CFG.token) {
    localStorage.setItem('gh_token', token);
    changed = true;
  }
  if (owner) { localStorage.setItem('gh_owner', owner); changed = true; }
  if (repo) { localStorage.setItem('gh_repo', repo); changed = true; }
  // URL에서 토큰 제거 (보안: 브라우저 히스토리에 남지 않게)
  if (changed && token) {
    const clean = window.location.origin + window.location.pathname;
    window.history.replaceState({}, '', clean);
    if (changed) toast('✅ 토큰이 자동 설정되었습니다!', 'success');
  }
}

// ── Init ──
(async function init() {
  const now = new Date();
  curYear = now.getFullYear();
  curMonth = now.getMonth();
  autoSetupFromURL();
  updateStatus();
  if (CFG.token) {
    await fetchExistingDates();
    await fetchCategoryData();
  }
  renderCalendar();
  if (!CFG.token) openSettings();
})();

// ── GitHub API ──
async function ghAPI(endpoint, opts = {}) {
  const res = await fetch(`https://api.github.com${endpoint}`, {
    headers: { 'Authorization': `token ${CFG.token}`, 'Accept': 'application/vnd.github.v3+json', ...opts.headers },
    ...opts
  });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

async function fetchExistingDates() {
  try {
    const items = await ghAPI(`/repos/${CFG.owner}/${CFG.repo}/contents/${CFG.base}?ref=${CFG.branch}`);
    existingDates.clear();
    items.filter(i => i.type === 'dir').forEach(i => existingDates.add(i.name));
  } catch(e) { console.warn('fetchDates:', e); }
}

async function fetchCategoryData() {
  try {
    const res = await ghAPI(`/repos/${CFG.owner}/${CFG.repo}/contents/${CFG.base}/_categories.json?ref=${CFG.branch}`);
    categoryData = JSON.parse(atob(res.content.replace(/\n/g,'')));
  } catch(e) { categoryData = {}; }
}

async function saveCategoryData() {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(categoryData, null, 2))));
  const path = `${CFG.base}/_categories.json`;
  let sha;
  try {
    const existing = await ghAPI(`/repos/${CFG.owner}/${CFG.repo}/contents/${path}?ref=${CFG.branch}`);
    sha = existing.sha;
  } catch(e) {}
  await ghAPI(`/repos/${CFG.owner}/${CFG.repo}/contents/${path}`, {
    method: 'PUT',
    body: JSON.stringify({ message: '[P-Reinforce] update categories', content, branch: CFG.branch, ...(sha ? {sha} : {}) })
  });
}

async function fetchFilesForDate(dateStr) {
  try {
    const items = await ghAPI(`/repos/${CFG.owner}/${CFG.repo}/contents/${CFG.base}/${dateStr}?ref=${CFG.branch}`);
    return items.filter(i => i.type === 'file');
  } catch(e) { return []; }
}

async function uploadFile(file, dateStr) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const b64 = reader.result.split(',')[1];
        const path = `${CFG.base}/${dateStr}/${file.name}`;
        const result = await ghAPI(`/repos/${CFG.owner}/${CFG.repo}/contents/${path}`, {
          method: 'PUT',
          body: JSON.stringify({ message: `[P-Reinforce] 📸 ${file.name}`, content: b64, branch: CFG.branch })
        });
        resolve(result);
      } catch(e) { reject(e); }
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── Calendar ──
function renderCalendar() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = `${curYear}년 ${months[curMonth]}`;

  const grid = document.getElementById('calGrid');
  const days = ['일','월','화','수','목','금','토'];
  let html = days.map(d => `<div class="cal-day">${d}</div>`).join('');

  const first = new Date(curYear, curMonth, 1);
  const last = new Date(curYear, curMonth + 1, 0);
  const today = new Date();
  const todayStr = fmt(today);

  // Previous month padding
  const prevLast = new Date(curYear, curMonth, 0);
  for (let i = first.getDay() - 1; i >= 0; i--) {
    const d = prevLast.getDate() - i;
    html += `<div class="cal-cell other">${d}</div>`;
  }

  // Current month
  for (let d = 1; d <= last.getDate(); d++) {
    const dateStr = fmt(new Date(curYear, curMonth, d));
    const isToday = dateStr === todayStr;
    const isSel = dateStr === selectedDate;
    const hasData = existingDates.has(dateStr);
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (isSel) cls += ' selected';
    const dateCats = categoryData[dateStr];
    let catNames = [];
    if (dateCats && typeof dateCats === 'object') catNames = Object.keys(dateCats);
    const catHtml = catNames.map(c => {
      const cat = CATEGORIES.find(x => x.key === c) || {cls:'cat-etc'};
      return `<span class="cat-tag ${cat.cls}">${c}</span>`;
    }).join('');
    const tagsDiv = catHtml ? `<div class="cat-tags">${catHtml}</div>` : '';
    html += `<div class="${cls}" onclick="selectDate('${dateStr}')">${d}${tagsDiv}</div>`;
  }

  // Next month padding
  const remaining = 7 - ((first.getDay() + last.getDate()) % 7);
  if (remaining < 7) {
    for (let d = 1; d <= remaining; d++) {
      html += `<div class="cal-cell other">${d}</div>`;
    }
  }

  grid.innerHTML = html;
}

function fmt(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}

function prevMonth() { curMonth--; if(curMonth<0){curMonth=11;curYear--;} renderCalendar(); }
function nextMonth() { curMonth++; if(curMonth>11){curMonth=0;curYear++;} renderCalendar(); }

async function selectDate(dateStr) {
  selectedDate = dateStr;
  selectedCategory = '';
  document.getElementById('selDate').textContent = dateStr;
  document.getElementById('uploadSection').style.display = 'block';
  // Render category buttons
  const catBtns = document.getElementById('catBtns');
  catBtns.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-btn" data-key="${c.key}" onclick="pickCategory('${c.key}',this)">${c.label}</button>`
  ).join('');
  renderCalendar();
  await loadFiles(dateStr);
}

async function loadFiles(dateStr) {
  const list = document.getElementById('fileList');
  list.innerHTML = '<p style="font-size:13px;color:var(--muted)">로딩 중...</p>';
  const files = await fetchFilesForDate(dateStr);
  if (files.length === 0) {
    list.innerHTML = '<p style="font-size:13px;color:var(--muted)">파일 없음</p>';
    return;
  }
  // Build file-to-category map from categoryData
  const fileCatMap = {};
  const dateCats = categoryData[dateStr];
  if (dateCats && typeof dateCats === 'object') {
    for (const [cat, fnames] of Object.entries(dateCats)) {
      for (const fn of fnames) fileCatMap[fn] = cat;
    }
  }
  // Group files by category
  const groups = {};
  for (const f of files) {
    const cat = fileCatMap[f.name] || '미분류';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(f);
  }
  // Render grouped
  let html = '';
  for (const [cat, gFiles] of Object.entries(groups)) {
    const catInfo = CATEGORIES.find(x => x.key === cat) || {cls:'cat-etc'};
    html += `<div class="cat-group"><div class="cat-group-header ${catInfo.cls}">${cat} (${gFiles.length})</div>`;
    html += gFiles.map(f => {
      const isImg = /\.(png|jpg|jpeg|webp|bmp)$/i.test(f.name);
      const isMd = /\.md$/i.test(f.name);
      const badge = isImg ? '<span class="badge badge-img">IMG</span>' : isMd ? '<span class="badge badge-md">MD</span>' : '';
      const thumb = isImg ? `<img class="thumb" src="${f.download_url}" alt="">` : `<div class="thumb" style="display:flex;align-items:center;justify-content:center;font-size:16px">${isMd?'📄':'📎'}</div>`;
      const clickData = JSON.stringify({name:f.name, url:f.download_url, isImg, isMd}).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
      return `<div class="file-item" onclick="previewFile(${clickData})">${thumb}<span class="name">${f.name}</span>${badge}</div>`;
    }).join('');
    html += '</div>';
  }
  list.innerHTML = html;
}

// ── Category ──
function pickCategory(key, btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (selectedCategory === key) { selectedCategory = ''; return; }
  selectedCategory = key;
  btn.classList.add('active');
}

// ── Upload ──
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

async function handleFiles(files) {
  if (!selectedDate) { toast('날짜를 먼저 선택하세요', 'error'); return; }
  if (!CFG.token) { toast('설정에서 GitHub Token을 입력하세요', 'error'); openSettings(); return; }
  if (!selectedCategory) { toast('카테고리를 먼저 선택하세요', 'error'); return; }

  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  bar.classList.add('active');

  const total = files.length;
  let done = 0;

  for (const file of files) {
    try {
      toast(`📤 업로드 중: ${file.name}`, 'info');
      await uploadFile(file, selectedDate);
      done++;
      fill.style.width = `${(done/total)*100}%`;
      toast(`✅ ${file.name} 업로드 완료!`, 'success');
    } catch(e) {
      toast(`❌ ${file.name} 실패: ${e.message}`, 'error');
    }
  }

  existingDates.add(selectedDate);
  // Save category per file
  if (selectedCategory) {
    if (!categoryData[selectedDate] || typeof categoryData[selectedDate] !== 'object') categoryData[selectedDate] = {};
    if (!categoryData[selectedDate][selectedCategory]) categoryData[selectedDate][selectedCategory] = [];
    for (const file of files) {
      if (!categoryData[selectedDate][selectedCategory].includes(file.name)) {
        categoryData[selectedDate][selectedCategory].push(file.name);
      }
    }
    try { await saveCategoryData(); } catch(e) { console.warn('cat save:', e); }
  }
  renderCalendar();
  await loadFiles(selectedDate);

  setTimeout(() => { bar.classList.remove('active'); fill.style.width = '0'; }, 2000);
  toast('🤖 GitHub Actions가 OCR 처리를 시작합니다. 잠시 후 MD 파일이 생성됩니다.', 'info');
}

// ── Settings ──
function openSettings() {
  document.getElementById('inputToken').value = CFG.token;
  document.getElementById('inputOwner').value = CFG.owner;
  document.getElementById('inputRepo').value = CFG.repo;
  document.getElementById('settingsModal').classList.add('active');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('active'); }
async function saveSettings() {
  localStorage.setItem('gh_token', document.getElementById('inputToken').value.trim());
  localStorage.setItem('gh_owner', document.getElementById('inputOwner').value.trim());
  localStorage.setItem('gh_repo', document.getElementById('inputRepo').value.trim());
  closeSettings();
  updateStatus();
  await fetchExistingDates();
  renderCalendar();
  toast('✅ 설정 저장 완료', 'success');
}

function updateStatus() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (CFG.token) { dot.className='dot on'; txt.textContent='Connected'; }
  else { dot.className='dot off'; txt.textContent='Token 필요'; }
}

// ── Toast ──
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
// ── Preview ──
function previewFile(info) {
  const modal = document.getElementById('previewModal');
  const title = document.getElementById('previewTitle');
  const body = document.getElementById('previewBody');
  title.textContent = info.name;
  body.innerHTML = '<div class="preview-loading">⏳ 로딩 중...</div>';
  modal.classList.add('active');

  if (info.isImg) {
    const img = new Image();
    img.onload = () => { body.innerHTML = ''; body.appendChild(img); };
    img.onerror = () => { body.innerHTML = '<div class="preview-loading">❌ 이미지를 불러올 수 없습니다</div>'; };
    img.src = info.url;
    img.style.cssText = 'width:100%;height:auto;border-radius:12px;';
  } else if (info.isMd) {
    fetch(info.url)
      .then(r => r.text())
      .then(text => {
        // 간단한 마크다운 렌더링
        let html = text
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/^### (.+)$/gm, '<h3>$1</h3>')
          .replace(/^## (.+)$/gm, '<h2>$1</h2>')
          .replace(/^# (.+)$/gm, '<h1>$1</h1>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`(.+?)`/g, '<code>$1</code>')
          .replace(/^- (.+)$/gm, '• $1')
          .replace(/\n/g, '<br>');
        body.innerHTML = `<div class="md-content">${html}</div>`;
      })
      .catch(() => { body.innerHTML = '<div class="preview-loading">❌ 파일을 불러올 수 없습니다</div>'; });
  } else {
    fetch(info.url)
      .then(r => r.text())
      .then(text => {
        body.innerHTML = `<div class="md-content">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}</div>`;
      })
      .catch(() => { body.innerHTML = '<div class="preview-loading">❌ 파일을 불러올 수 없습니다</div>'; });
  }
}
function closePreview() { document.getElementById('previewModal').classList.remove('active'); }

// ── Copy Mobile Link ──
function copyMobileLink() {
  const token = document.getElementById('inputToken').value.trim() || CFG.token;
  const owner = document.getElementById('inputOwner').value.trim() || CFG.owner;
  const repo = document.getElementById('inputRepo').value.trim() || CFG.repo;
  if (!token) { toast('❌ 먼저 토큰을 입력하세요', 'error'); return; }
  const base = `https://${owner}.github.io/${repo}/`;
  const url = `${base}?token=${encodeURIComponent(token)}&owner=${encodeURIComponent(owner)}&repo=${encodeURIComponent(repo)}`;
  navigator.clipboard.writeText(url).then(() => {
    toast('📱 링크가 복사되었습니다! 카톡 나에게 보내기로 전송하세요', 'success');
    document.getElementById('btnCopyLink').textContent = '✅ 복사됨!';
    setTimeout(() => { document.getElementById('btnCopyLink').textContent = '📱 핸드폰 링크 복사'; }, 3000);
  }).catch(() => {
    // clipboard API 실패 시 직접 표시
    prompt('이 링크를 복사하세요:', url);
  });
}
