              '운동': [
                  '운동', '헬스', '수영', '웨이트', '러닝', '달리기',
                  '근력', '유산소', '스트레칭', '피트니스', '체중',
                  '다이어트', '벤치프레스', '스쿼트', '데드리프트', '크로스핏'
              ],
              '육아': [
                  '육아', '아기', '아이', '추억', '돌잔치', '기저귀',
                  '이유식', '놀이', '어린이집', '유치원', '성장',
                  '딸', '아들', '태어', '출산'
              ],
          }

          def classify_file(fname, content=''):
              text = (fname + ' ' + content).lower()
              scores = {}
              for cat, keywords in CATEGORIES.items():
                  score = sum(1 for kw in keywords if kw.lower() in text)
                  if score > 0:
                      scores[cat] = score
              if not scores:
                  return '기타'
              return max(scores, key=scores.get)

          cat_path = '00_Raw/_categories.json'

          # Always rebuild from scratch to avoid stale/wrong categories
          cat_data = {}

          raw_dir = '00_Raw'
          for entry in sorted(os.listdir(raw_dir)):
              full = os.path.join(raw_dir, entry)
              if not os.path.isdir(full) or not re.match(r'\d{4}-\d{2}-\d{2}', entry):
                  continue

              cat_data[entry] = {}
              # First pass: classify MD files and track image-to-category mapping
              img_cat_map = {}  # image_filename -> category

              for fname in os.listdir(full):
                  if fname.startswith('_') or fname.startswith('.') or fname == 'README.md':
                      continue
                  if not fname.endswith('.md'):
                      continue

                  content = ''
                  fpath = os.path.join(full, fname)
                  try:
                      with open(fpath, 'r', encoding='utf-8') as f:
                          content = f.read()
                  except:
                      pass

                  cat = classify_file(fname, content)
                  if cat not in cat_data[entry]:
                      cat_data[entry][cat] = []
                  cat_data[entry][cat].append(fname)

                  # Track original image → same category
                  m = re.search(r'original_image:\s*["\']?([^"\']\S+)', content)
                  if m:
                      orig_img = m.group(1).strip().strip('"').strip("'")
                      if orig_img:
                          img_cat_map[orig_img] = cat

              # Second pass: add image/other files using mapped category
              for fname in os.listdir(full):
                  if fname.startswith('_') or fname.startswith('.') or fname == 'README.md':
                      continue
                  if fname.endswith('.md'):
                      continue  # Already processed

                  # Use category from paired MD, or classify by filename
                  cat = img_cat_map.get(fname, classify_file(fname, ''))
                  if cat not in cat_data[entry]:
                      cat_data[entry][cat] = []
                  cat_data[entry][cat].append(fname)

              # Remove empty dates
              if not cat_data[entry]:
                  del cat_data[entry]

          with open(cat_path, 'w', encoding='utf-8') as f:
              json.dump(cat_data, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(cat_data)}개 날짜 파일별 카테고리 분류 완료")
          for date, cats in sorted(cat_data.items()):
              for c, files in cats.items():
                  print(f"  {date} [{c}] → {', '.join(files)}")

      - name: "📱 텔레그램 알림 - 카테고리 분류 완료"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        shell: python3 {0}
        run: |
          import os, json
          from urllib.request import Request, urlopen

          BOT_TOKEN = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          if not BOT_TOKEN:
              exit(0)

          notify_path = '00_Raw/_notify.json'
          if not os.path.exists(notify_path):
              exit(0)

          with open(notify_path, 'r') as f:
              notify_data = json.load(f)

          # 카테고리 데이터 읽기
          cat_data = {}
          cat_path = '00_Raw/_categories.json'
          if os.path.exists(cat_path):
              with open(cat_path, 'r') as f:
                  cat_data = json.load(f)

          def send_telegram(chat_id, text):
              url = f'https://api.telegram.org/bot{BOT_TOKEN}/sendMessage'
              payload = json.dumps({'chat_id': chat_id, 'text': text}).encode('utf-8')
              req = Request(url, data=payload, headers={'Content-Type': 'application/json'}, method='POST')
              try:
                  with urlopen(req, timeout=10) as r:
                      pass
              except Exception as e:
                  print(f'  ⚠️ 알림 실패: {e}')

          for item in notify_data.get('pending', []):
              chat_id = item.get('chat_id')
              if not chat_id:
                  continue

              msg = '🏷️ [4.5/5] 카테고리 분류 완료!\n\n'
              # 최신 날짜의 카테고리 보여주기
              for date in sorted(cat_data.keys())[-2:]:
                  for cat, files in cat_data[date].items():
                      msg += f'  📂 {date}/{cat}: {len(files)}개 파일\n'
              msg += '\n🚀 GitHub Push 진행 중...'
              send_telegram(chat_id, msg)

          print('✅ 카테고리 분류 알림 전송 완료')

      - name: "🚀 Commit & Push"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git config user.name "P-Reinforce Bot"
          git config user.email "bot@p-reinforce.local"
          
          # Add all generated files EXCEPT _categories.json
          git add -A -- ':!00_Raw/_categories.json'
          
          if git diff --cached --quiet; then
            echo "📭 No new documents to commit"
          else
            git commit -m "[P-Reinforce] 🧠 Gemini 지식 문서화"
          fi
          
          # Pull latest changes (may include deletions from web UI)
          git pull --no-rebase origin main --strategy-option=ours || {
            echo "⚠️ Pull conflict, aborting merge and retrying..."
            git merge --abort 2>/dev/null || true
            git pull --no-rebase origin main --strategy-option=theirs || true
          }
          
          # NOW regenerate _categories.json from the merged state
          python3 << 'PYEOF'
          import os, json, re
          CATEGORIES = {
              'AI공부': ['ai','gpt','chatgpt','gemini','claude','llm','프롬프트','prompt','이미지생성','영상생성','stable diffusion','midjourney','api','모델','rag','벡터','임베딩','에이전트','agent','자동화','automation','파이프라인','렌더','render','ocr','위키','wiki','vibe coding','바이브코딩','cursor','copilot','code','코딩','json','debug','script','python','스크립트','html','프롬프트기법','프레임워크','라이브러리','인포그래픽','데이터','프로젝트','웹생성','앱생성'],
              '회사': ['엑셀','excel','보고서','보고','건설','안전','시공','공사','설계','감리','인허가','계약','발주','입찰','견적','업무','회의','결재','기안','품의','csi','새마을금고','공문','직장','qr','가이드','guide','infographic','result_guide'],
              '좋은글': ['명언','인용','quote','좋은글','명상','동기부여','자기계발','독서','인사이트','지혜','철학'],
              '유튜브': ['youtube','유튜브','shorts','구독','조회수','알고리즘','mrbeast','채널','channel','업로드','upload','영상편집','freedom grind','luna_vault','onia','콘텐츠','content','ctr','lofi','비트','beat','phonk'],
              '1인기업': ['1인기업','사업','창업','수익','부업','프리랜서','마케팅','브랜딩','개인사업','소득','투잡'],
              '운동': ['헬스','운동','수영','달리기','웨이트','근력','스트레칭','다이어트','체중','피트니스','gym','workout'],
              '육아': ['아기','육아','아이','유아','돌봄','추억','성장','양육','부모','가족','태교']
          }
          def classify(fn, ct=''):
              t = (fn + ' ' + ct).lower()
              s = {}
              for c, kws in CATEGORIES.items():
                  sc = sum(1 for k in kws if k.lower() in t)
                  if sc > 0: s[c] = sc
              return max(s, key=s.get) if s else '기타'
          
          raw = '00_Raw'; d = {}
          for e in sorted(os.listdir(raw)):
              fp = os.path.join(raw, e)
              if not os.path.isdir(fp) or not re.match(r'\d{4}-\d{2}-\d{2}', e): continue
              d[e] = {}; img_map = {}
              for fn in sorted(os.listdir(fp)):
                  if fn.startswith('_') or fn.startswith('.') or fn == 'README.md': continue
                  if not fn.endswith('.md'): continue
                  ct = ''
                  try:
                      with open(os.path.join(fp, fn), 'r', encoding='utf-8') as f: ct = f.read()
                  except: pass
                  c = classify(fn, ct)
                  if c not in d[e]: d[e][c] = []
                  d[e][c].append(fn)
                  m = re.search(r'original_image:\s*"?([^"\s]+)', ct)
                  if m: img_map[m.group(1).strip()] = c
              for fn in sorted(os.listdir(fp)):
                  if fn.startswith('_') or fn.startswith('.') or fn == 'README.md' or fn.endswith('.md'): continue
                  c = img_map.get(fn, classify(fn, ''))
                  if c not in d[e]: d[e][c] = []
                  d[e][c].append(fn)
              if not d[e]: del d[e]
          with open(os.path.join(raw, '_categories.json'), 'w', encoding='utf-8') as f:
              json.dump(d, f, ensure_ascii=False, indent=2)
          # Validate
          with open(os.path.join(raw, '_categories.json'), 'r') as f:
              json.load(f)
          print(f'✅ _categories.json rebuilt: {len(d)} dates')
          # Build year-split search index (full content)
          by_year = {}
          for e2 in sorted(os.listdir(raw)):
              fp2 = os.path.join(raw, e2)
              if not os.path.isdir(fp2) or not re.match(r'\d{4}-\d{2}-\d{2}', e2): continue
              year = e2[:4]
              if year not in by_year: by_year[year] = []
              for fn2 in sorted(os.listdir(fp2)):
                  if fn2.startswith('_') or fn2.startswith('.') or fn2 == 'README.md': continue
                  if not fn2.endswith('.md'): continue
                  ct2 = ''
                  try:
                      with open(os.path.join(fp2, fn2), 'r', encoding='utf-8') as f2: ct2 = f2.read()
                  except: pass
                  tl = fn2.replace('.md','')
                  tm = re.search(r'title:\s*["\'\']?(.+?)["\'\']?\s*$', ct2, re.MULTILINE)
                  if tm: tl = tm.group(1).strip().strip('"').strip("'")
                  cf = '기타'
                  if e2 in d:
                      for cc, ff in d[e2].items():
                          if fn2 in ff: cf = cc; break
                  body = ct2
                  fe = ct2.find('---', 3)
                  if ct2.startswith('---') and fe > 0: body = ct2[fe+3:]
                  by_year[year].append({'d':e2,'n':fn2,'c':cf,'t':tl,'s':body.replace('\n',' ')})
          all_years = sorted(by_year.keys())
          for yr, entries in by_year.items():
              with open(os.path.join(raw, f'_search_index_{yr}.json'), 'w', encoding='utf-8') as f:
                  json.dump(entries, f, ensure_ascii=False)
          with open(os.path.join(raw, '_search_years.json'), 'w', encoding='utf-8') as f:
              json.dump(all_years, f, ensure_ascii=False)
          total = sum(len(v) for v in by_year.values())
          print(f'Search index: {total} entries across {len(all_years)} years: {all_years}')
          old_idx = os.path.join(raw, '_search_index.json')
          if os.path.exists(old_idx): os.remove(old_idx)
          PYEOF
          
          # Commit categories + search indexes
          git add 00_Raw/_categories.json 00_Raw/_search_years.json
          for f in 00_Raw/_search_index_*.json; do git add "$f"; done
          git rm -f 00_Raw/_search_index.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "[P-Reinforce] 🏷️ 카테고리 분류"
          
          # Push with retry
          for i in 1 2 3; do
            git push && echo "🚀 Push complete!" && break
            echo "⚠️ Push failed, retrying ($i/3)..."
            git pull --no-rebase origin main --strategy-option=ours || true
            sleep 2
          done

      - name: "📱 텔레그램 알림 - 최종 완료"
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        shell: python3 {0}
        run: |
          import os, json
          from urllib.request import Request, urlopen

          BOT_TOKEN = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          if not BOT_TOKEN:
              print('⏭️ TELEGRAM_BOT_TOKEN 없음')
              exit(0)

          notify_path = '00_Raw/_notify.json'
          if not os.path.exists(notify_path):
              print('⏭️ _notify.json 없음')
              exit(0)

          with open(notify_path, 'r') as f:
              notify_data = json.load(f)

          def send_telegram(chat_id, text):
              url = f'https://api.telegram.org/bot{BOT_TOKEN}/sendMessage'
              payload = json.dumps({'chat_id': chat_id, 'text': text}).encode('utf-8')
              req = Request(url, data=payload, headers={'Content-Type': 'application/json'}, method='POST')
              try:
                  with urlopen(req, timeout=10) as r:
                      pass
              except Exception as e:
                  print(f'  ⚠️ 알림 실패: {e}')

          for item in notify_data.get('pending', []):
              chat_id = item.get('chat_id')
              fname = item.get('file', '')
              category = item.get('category', '')
              date = item.get('date', '')
              ocr_engine = item.get('ocr_engine', 'unknown')
              md_file = item.get('md_file', '')
              if not chat_id:
                  continue

              msg = '🎉 [5/5] 모든 처리 완료!\n\n'
              msg += f'📸 이미지: {fname}\n'
              msg += f'📂 카테고리: {category}\n'
              msg += f'📅 날짜: {date}\n'
              if md_file:
                  msg += f'📄 문서: {md_file}\n'
              msg += '\n'

              if ocr_engine == 'tesseract':
                  msg += '⚠️ Gemini AI 실패 → Tesseract OCR 폴백 사용\n'
                  msg += '  (문서 품질이 낮을 수 있습니다)\n\n'
              elif ocr_engine == 'gemini':
                  msg += '🧠 Gemini AI 문서화 완료\n\n'

              msg += '✅ GitHub Push 완료\n'
              msg += '✅ MD 문서 생성 완료\n'
              msg += '✅ 카테고리 분류 완료\n'
              msg += '✅ 캘린더 자동 반영 완료\n\n'
              msg += '🌐 캘린더 확인:\nhttps://abraxass0511-lab.github.io/INFJ-s-wiki/'
              send_telegram(chat_id, msg)
              print(f'  📱 최종 완료 알림: chat_id={chat_id} (engine={ocr_engine})')

          # pending 비우기
          notify_data['pending'] = []
          notify_data['last_completed'] = notify_data.get('last_completed', [])
          with open(notify_path, 'w') as f:
              json.dump(notify_data, f, ensure_ascii=False, indent=2)
          print('✅ 최종 완료 알림 전송 + _notify.json 초기화')

      - name: "📋 알림 메타 커밋"
        if: success()
        run: |
          git add 00_Raw/_notify.json 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "[P-Reinforce] 📱 알림 메타 초기화"
            git push || true
          }

      - name: "🔔 실패 알림"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toLocaleString('ko-KR', {timeZone:'Asia/Seoul'});
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            // Create a GitHub Issue as notification
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 [P-Reinforce] OCR 자동 문서화 실패 - ${now}`,
              body: `## ❌ 워크플로우 실패 알림\n\n` +
                    `| 항목 | 내용 |\n|------|------|\n` +
                    `| ⏰ 시간 | ${now} |\n` +
                    `| 🔗 로그 | [확인하기](${runUrl}) |\n` +
                    `| 🏃 Run ID | ${context.runId} |\n\n` +
                    `자동으로 생성된 알림입니다. 로그를 확인하고 문제를 해결해주세요.`,
              labels: ['bug', 'automated']
            });
            
            // Also update _categories.json with error status
            const path = '00_Raw/_categories.json';
            let sha, content;
            try {
              const file = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path, ref: 'main'
              });
              sha = file.data.sha;
              content = JSON.parse(Buffer.from(file.data.content, 'base64').toString());
            } catch(e) { content = {}; }
            
            content._error = {
              time: now,
              message: 'OCR 자동 문서화 실패',
              runUrl: runUrl
            };
            
            const encoded = Buffer.from(JSON.stringify(content, null, 2)).toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo,
              path, message: '[P-Reinforce] ⚠️ 워크플로우 실패 알림',
              content: encoded, branch: 'main', ...(sha ? {sha} : {})
            });
