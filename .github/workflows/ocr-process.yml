name: "📸 OCR 자동 문서화 & 카테고리 분류"

on:
  push:
    paths:
      - '00_Raw/**/*.png'
      - '00_Raw/**/*.jpg'
      - '00_Raw/**/*.jpeg'
      - '00_Raw/**/*.webp'
      - '00_Raw/**/*.bmp'
      - '00_Raw/**/*.md'
      - '00_Raw/**/.trigger'
  workflow_dispatch:

jobs:
  ocr-and-document:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "⏳ _notify.json 동기화 대기"
        env:
          GH_TOKEN: ${{ secrets.GIT_PERSONAL_ACCESS_TOKEN }}
        shell: python3 {0}
        run: |
          import os, json, base64, time
          from urllib.request import Request, urlopen

          token = os.environ.get('GH_TOKEN', '')
          if not token:
              print('⏭️ GH_TOKEN 없음 — 건너뜀')
              exit(0)

          notify_path = '00_Raw/_notify.json'
          api_url = 'https://api.github.com/repos/abraxass0511-lab/INFJ-s-wiki/contents/00_Raw/_notify.json?ref=main'

          # 최대 30초 대기 (Worker가 _notify.json 커밋할 시간)
          for attempt in range(6):
              time.sleep(5)
              try:
                  req = Request(api_url, headers={
                      'Authorization': f'token {token}',
                      'Accept': 'application/vnd.github.v3+json',
                      'User-Agent': 'wiki-ocr-bot'
                  })
                  with urlopen(req, timeout=10) as resp:
                      data = json.loads(resp.read().decode())
                      if data.get('content'):
                          content = base64.b64decode(data['content']).decode('utf-8')
                          notify = json.loads(content)
                          if notify.get('pending'):
                              os.makedirs(os.path.dirname(notify_path), exist_ok=True)
                              with open(notify_path, 'w', encoding='utf-8') as f:
                                  json.dump(notify, f, ensure_ascii=False, indent=2)
                              print(f'✅ _notify.json 동기화 완료 ({len(notify["pending"])}건 대기)')
                              exit(0)
                          else:
                              print(f'⏳ _notify.json 있지만 pending 없음 (시도 {attempt+1}/6)')
                      else:
                          print(f'⏳ _notify.json 없음 (시도 {attempt+1}/6)')
              except Exception as e:
                  print(f'⏳ 대기 중 (시도 {attempt+1}/6): {e}')

          # 로컬 파일이라도 있으면 사용
          if os.path.exists(notify_path):
              print('ℹ️ 로컬 _notify.json 사용')
          else:
              print('⚠️ _notify.json을 찾지 못함 — 알림 없이 진행')

      - name: "🔧 Install Tesseract OCR (fallback)"
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-kor

      - name: "🧠 Gemini 지식 문서화 + OCR"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: python3 {0}
        run: |
          import os, json, base64, glob, subprocess, time
          from urllib.request import Request, urlopen
          from urllib.error import URLError

          API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent"
          API_KEY = os.environ.get("GEMINI_API_KEY", "")

          if API_KEY:
              masked = API_KEY[:8] + '...' + API_KEY[-4:] if len(API_KEY) > 12 else '***'
              print(f"✅ Gemini API 키 감지 (길이: {len(API_KEY)}, 시작: {masked})")
              # Quick validation test
              try:
                  test_payload = json.dumps({"contents":[{"parts":[{"text":"test"}]}]}).encode()
                  test_req = Request(f"{API_URL}?key={API_KEY}", data=test_payload, headers={"Content-Type":"application/json"}, method="POST")
                  with urlopen(test_req, timeout=10) as r:
                      print(f"✅ Gemini API 연결 테스트 성공! (HTTP {r.status})")
              except Exception as te:
                  err_code = getattr(te, 'code', 'unknown')
                  err_body = ''
                  if hasattr(te, 'read'):
                      try: err_body = te.read().decode()[:300]
                      except: pass
                  print(f"❌ Gemini API 연결 테스트 실패! HTTP {err_code}")
                  print(f"  📋 응답: {err_body}")
                  if str(err_code) == '400':
                      print("  → API 키가 유효하지 않습니다. GitHub Secrets > GEMINI_API_KEY를 확인하세요.")
                  elif str(err_code) == '403':
                      print("  → API 키 권한 부족 또는 할당량 초과입니다.")
                  elif str(err_code) == '429':
                      print("  → 요청 속도 제한입니다. 잠시 후 다시 시도됩니다.")
          else:
              print("⚠️ GEMINI_API_KEY가 설정되지 않았습니다! Tesseract로 폴백됩니다.")
              print("  → GitHub 리포지토리 Settings > Secrets > GEMINI_API_KEY를 확인하세요.")

          PROMPT = """당신은 지식 정리 전문가입니다. 이 이미지의 내용을 분석하여 아래 형식의 한국어 지식 문서를 만들어주세요.

          반드시 아래 형식을 지켜주세요:

          ---
          title: "(내용을 요약하는 구체적인 한국어 제목)"
          filename: "(제목을 밑줄로_연결한_파일명용_한국어이름)"
          date: "{date}"
          source: image-ocr-gemini
          original_image: "{filename}"
          tags: [자동생성된 태그들]
          ---

          # (제목)

          > 📷 원본 이미지: `{filename}`
          > 🤖 Gemini AI 자동 문서화 | {date}

          ---

          ## 📌 Brief Summary
          (2~3문장으로 핵심 요약)

          ## 📖 Core Content

          ### 문제 상황 / 배경
          (이미지에서 다루는 문제나 배경 설명)

          ### 핵심 내용 / 해결 방법
          (주요 내용을 구조적으로 정리)

          ### 키워드
          (쉼표로 구분된 핵심 키워드 목록)

          ### 참고 자료
          (이미지에 참고 링크나 출처가 있으면 기재, 없으면 "원본 이미지 참조")

          ## 🔗 Knowledge Connections
          (관련될 수 있는 지식 주제를 [[위키링크]] 형태로 3~5개 제안)

          중요:
          - 이미지에 텍스트가 있으면 정확히 읽어주세요. 표 형태라면 표 내용을 빠짐없이 포함해주세요.
          - filename 필드는 내용을 요약한 한국어 이름으로, 공백 대신 밑줄(_)을 쓰세요.
            예시: "AI이미지_부분수정_JSON프롬프트기법", "엑셀_셀병합_단축키_정리", "공자_논어_핵심명언"
          """

          def gemini_process(img_path, date_str, filename):
              """Send image to Gemini API with retry logic for transient errors."""
              with open(img_path, "rb") as f:
                  img_b64 = base64.b64encode(f.read()).decode()

              ext = os.path.splitext(filename)[1].lower()
              mime_map = {".png": "image/png", ".jpg": "image/jpeg", ".jpeg": "image/jpeg", ".webp": "image/webp", ".bmp": "image/bmp"}
              mime = mime_map.get(ext, "image/png")

              prompt = PROMPT.replace("{date}", date_str).replace("{filename}", filename)

              payload = json.dumps({
                  "contents": [{
                      "parts": [
                          {"text": prompt},
                          {"inline_data": {"mime_type": mime, "data": img_b64}}
                      ]
                  }],
                  "generationConfig": {"temperature": 0.3, "maxOutputTokens": 4096}
              }).encode()

              MAX_RETRIES = 4
              RETRY_CODES = {429, 500, 502, 503, 504}

              for attempt in range(MAX_RETRIES):
                  req = Request(f"{API_URL}?key={API_KEY}", data=payload, headers={"Content-Type": "application/json"}, method="POST")
                  try:
                      with urlopen(req, timeout=90) as resp:
                          result = json.loads(resp.read().decode())
                          text = result["candidates"][0]["content"]["parts"][0]["text"]
                          # Strip markdown code fences if Gemini wraps output
                          if text.startswith("```"):
                              lines = text.split("\n")
                              if lines[0].strip().startswith("```"):
                                  lines = lines[1:]
                              if lines and lines[-1].strip() == "```":
                                  lines = lines[:-1]
                              text = "\n".join(lines)
                          return text
                  except Exception as e:
                      err_code = getattr(e, 'code', 0)
                      err_body = ''
                      if hasattr(e, 'read'):
                          try: err_body = e.read().decode()[:500]
                          except: pass

                      if err_code in RETRY_CODES and attempt < MAX_RETRIES - 1:
                          wait = (2 ** attempt) * 5  # 5s, 10s, 20s
                          print(f"  ⚠️ Gemini API {err_code} (attempt {attempt+1}/{MAX_RETRIES}), {wait}초 후 재시도...")
                          time.sleep(wait)
                          continue

                      print(f"  ❌ Gemini API 최종 실패 (attempt {attempt+1}/{MAX_RETRIES}): {e}")
                      if err_body:
                          print(f"  📋 응답: {err_body}")
                      return None
              return None

          def tesseract_fallback(img_path, date_str, filename):
              """Fallback to Tesseract OCR if Gemini fails."""
              try:
                  result = subprocess.run(["tesseract", img_path, "stdout", "-l", "kor+eng", "--psm", "3"],
                                          capture_output=True, text=True, timeout=30)
                  ocr_text = result.stdout.strip() or "(이미지에서 텍스트를 추출하지 못했습니다)"
              except:
                  ocr_text = "(OCR 처리 실패)"

              file_base = os.path.splitext(filename)[0]
              return f"""---
          title: "{file_base}"
          date: "{date_str}"
          source: image-ocr-tesseract
          original_image: "{filename}"
          tags: [ocr, auto-generated]
          ---

          # {file_base}

          > 📷 원본 이미지: `{filename}`
          > 🤖 자동 추출 (Tesseract OCR) | {date_str}

          ---

          {ocr_text}
          """

          # Find all images without corresponding .md files
          images = []
          for ext in ["png", "jpg", "jpeg", "webp", "bmp"]:
              images.extend(glob.glob(f"00_Raw/**/*.{ext}", recursive=True))
              images.extend(glob.glob(f"00_Raw/**/*.{ext.upper()}", recursive=True))

          def extract_filename_from_md(content):
              """Extract filename field from Gemini-generated MD frontmatter."""
              import re as _re
              m = _re.search(r'filename:\s*["\']?([^"\']\S+)', content)
              if m:
                  name = m.group(1).strip().strip('"').strip("'")
                  # Clean up: remove spaces, ensure underscores
                  name = name.replace(' ', '_').replace('/', '_')
                  # Remove problematic chars
                  name = _re.sub(r'[<>:"/\\|?*]', '', name)
                  if name:
                      return name
              return None

          # Track existing MD files to avoid duplicates
          def get_existing_md_files(directory):
              return set(f for f in os.listdir(directory) if f.endswith('.md'))

          processed = 0
          for img_path in sorted(set(images)):
              img_dir = os.path.dirname(img_path)
              # Check if any MD references this image already
              filename = os.path.basename(img_path)
              already_has_md = False
              tesseract_md_path = None
              for existing_md in glob.glob(os.path.join(img_dir, '*.md')):
                  try:
                      with open(existing_md, 'r', encoding='utf-8') as _f:
                          head = _f.read(500)
                          if filename in head:
                              already_has_md = True
                              # Check if it was made by Tesseract (low quality)
                              if 'image-ocr-tesseract' in head and API_KEY:
                                  tesseract_md_path = existing_md
                              break
                  except:
                      pass
              # If Tesseract MD exists and we have Gemini key → re-process
              if tesseract_md_path:
                  print(f"♻️  Tesseract MD 발견, Gemini로 재처리: {filename}")
                  os.remove(tesseract_md_path)
                  already_has_md = False
              if already_has_md:
                  print(f"⏭️  Skip (MD exists): {filename}")
                  continue

              date_str = os.path.basename(img_dir)
              print(f"🔍 Processing: {img_path}")

              # Try Gemini first, fallback to Tesseract
              content = None
              ocr_engine = 'none'
              if API_KEY:
                  content = gemini_process(img_path, date_str, filename)
                  if content:
                      print(f"  ✅ Gemini 문서화 완료")
                      ocr_engine = 'gemini'
                  time.sleep(2)  # Rate limit

              if not content:
                  content = tesseract_fallback(img_path, date_str, filename)
                  print(f"  ⚠️ Tesseract 폴백 사용")
                  ocr_engine = 'tesseract'

              # Extract descriptive filename from Gemini output
              desc_name = extract_filename_from_md(content) if content else None
              if desc_name:
                  md_filename = f"{desc_name}.md"
              else:
                  md_filename = os.path.splitext(filename)[0] + ".md"

              md_path = os.path.join(img_dir, md_filename)
              # Avoid overwrite
              if os.path.exists(md_path):
                  md_path = os.path.join(img_dir, os.path.splitext(filename)[0] + ".md")

              with open(md_path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"  📝 Created: {os.path.basename(md_path)} (engine={ocr_engine})")
              processed += 1

              # _notify.json에 OCR 엔진 결과 기록
              notify_path = '00_Raw/_notify.json'
              if os.path.exists(notify_path):
                  try:
                      with open(notify_path, 'r', encoding='utf-8') as nf:
                          ndata = json.load(nf)
                      for item in ndata.get('pending', []):
                          if filename in item.get('file', ''):
                              item['ocr_engine'] = ocr_engine
                              item['md_file'] = os.path.basename(md_path)
                      with open(notify_path, 'w', encoding='utf-8') as nf:
                          json.dump(ndata, nf, ensure_ascii=False, indent=2)
                  except:
                      pass

          print(f"\n✅ 총 {processed}개 이미지 문서화 완료")

      - name: "📱 텔레그램 알림 - MD 생성 완료"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GIT_TOKEN_SECRET: ${{ secrets.GIT_PERSONAL_ACCESS_TOKEN }}
        shell: python3 {0}
        run: |
          import os, json, glob
          from urllib.request import Request, urlopen

          BOT_TOKEN = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          GH_SECRET = os.environ.get('GIT_TOKEN_SECRET', '')[:8]
          WORKER_URL = 'https://wiki-telegram-bot.abraxass0511.workers.dev/notify'

          if not BOT_TOKEN:
              print('⏭️ TELEGRAM_BOT_TOKEN 없음 — 알림 건너뜀')
              exit(0)

          # _notify.json 읽기
          notify_path = '00_Raw/_notify.json'
          if not os.path.exists(notify_path):
              print('⏭️ _notify.json 없음 — 알림 건너뜀')
              exit(0)

          with open(notify_path, 'r') as f:
              notify_data = json.load(f)

          pending = notify_data.get('pending', [])
          if not pending:
              print('⏭️ 대기 중인 알림 없음')
              exit(0)

          # 생성된 MD 파일 목록 수집
          new_mds = []
          for md in glob.glob('00_Raw/**/*.md', recursive=True):
              if '_categories' not in md and 'README' not in md and '_notify' not in md:
                  new_mds.append(os.path.basename(md))

          def send_telegram(chat_id, text):
              """Send message via Telegram Bot API directly."""
              import urllib.parse
              url = f'https://api.telegram.org/bot{BOT_TOKEN}/sendMessage'
              payload = json.dumps({'chat_id': chat_id, 'text': text}).encode('utf-8')
              req = Request(url, data=payload, headers={'Content-Type': 'application/json'}, method='POST')
              try:
                  with urlopen(req, timeout=10) as r:
                      return r.status == 200
              except Exception as e:
                  print(f'  ⚠️ 알림 전송 실패: {e}')
                  return False

          for item in pending:
              chat_id = item.get('chat_id')
              fname = item.get('file', '')
              category = item.get('category', '')
              date = item.get('date', '')
              if not chat_id:
                  continue

              # 해당 이미지의 MD 파일 찾기
              matched_mds = [md for md in new_mds if fname.split('.')[0].lower() in md.lower()] if fname else []
              md_list = ', '.join(new_mds[:5]) if new_mds else '처리 중...'

              msg = f'🤖 [4/5] Gemini AI 문서화 완료!\n\n'
              msg += f'📄 생성된 MD 파일:\n'
              for md in new_mds[:5]:
                  msg += f'  • {md}\n'
              if len(new_mds) > 5:
                  msg += f'  ... 외 {len(new_mds)-5}개\n'
              msg += f'\n🏷️ 카테고리 분류 진행 중...'

              send_telegram(chat_id, msg)
              print(f'  📱 알림 전송: chat_id={chat_id}')

          print(f'✅ {len(pending)}건 MD 생성 알림 전송 완료')

      - name: "🏷️ 파일별 자동 카테고리 분류"
        shell: python3 {0}
        run: |
          import os, json, re

          CATEGORIES = {
              'AI공부': [
                  'ai', '프롬프트', 'gpt', '모델', '딥러닝', '머신러닝', 'llm',
