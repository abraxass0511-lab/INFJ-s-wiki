name: "📸 OCR 자동 문서화 & 카테고리 분류"

on:
  push:
    paths:
      - '00_Raw/**/*.png'
      - '00_Raw/**/*.jpg'
      - '00_Raw/**/*.jpeg'
      - '00_Raw/**/*.webp'
      - '00_Raw/**/*.bmp'
      - '00_Raw/**/.trigger'
  workflow_dispatch:

jobs:
  ocr-and-document:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔧 Install Tesseract OCR (fallback)"
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-kor

      - name: "🧠 Gemini 지식 문서화 + OCR"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: python3 {0}
        run: |
          import os, json, base64, glob, subprocess, time
          from urllib.request import Request, urlopen
          from urllib.error import URLError

          API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent"
          API_KEY = os.environ.get("GEMINI_API_KEY", "")

          if API_KEY:
              masked = API_KEY[:8] + '...' + API_KEY[-4:] if len(API_KEY) > 12 else '***'
              print(f"✅ Gemini API 키 감지 (길이: {len(API_KEY)}, 시작: {masked})")
              # Quick validation test
              try:
                  test_payload = json.dumps({"contents":[{"parts":[{"text":"test"}]}]}).encode()
                  test_req = Request(f"{API_URL}?key={API_KEY}", data=test_payload, headers={"Content-Type":"application/json"}, method="POST")
                  with urlopen(test_req, timeout=10) as r:
                      print(f"✅ Gemini API 연결 테스트 성공! (HTTP {r.status})")
              except Exception as te:
                  err_code = getattr(te, 'code', 'unknown')
                  err_body = ''
                  if hasattr(te, 'read'):
                      try: err_body = te.read().decode()[:300]
                      except: pass
                  print(f"❌ Gemini API 연결 테스트 실패! HTTP {err_code}")
                  print(f"  📋 응답: {err_body}")
                  if str(err_code) == '400':
                      print("  → API 키가 유효하지 않습니다. GitHub Secrets > GEMINI_API_KEY를 확인하세요.")
                  elif str(err_code) == '403':
                      print("  → API 키 권한 부족 또는 할당량 초과입니다.")
                  elif str(err_code) == '429':
                      print("  → 요청 속도 제한입니다. 잠시 후 다시 시도됩니다.")
          else:
              print("⚠️ GEMINI_API_KEY가 설정되지 않았습니다! Tesseract로 폴백됩니다.")
              print("  → GitHub 리포지토리 Settings > Secrets > GEMINI_API_KEY를 확인하세요.")

          PROMPT = """당신은 지식 정리 전문가입니다. 이 이미지의 내용을 분석하여 아래 형식의 한국어 지식 문서를 만들어주세요.

          반드시 아래 형식을 지켜주세요:

          ---
          title: "(내용을 요약하는 구체적인 한국어 제목)"
          filename: "(제목을 밑줄로_연결한_파일명용_한국어이름)"
          date: "{date}"
          source: image-ocr-gemini
          original_image: "{filename}"
          tags: [자동생성된 태그들]
          ---

          # (제목)

          > 📷 원본 이미지: `{filename}`
          > 🤖 Gemini AI 자동 문서화 | {date}

          ---

          ## 📌 Brief Summary
          (2~3문장으로 핵심 요약)

          ## 📖 Core Content

          ### 문제 상황 / 배경
          (이미지에서 다루는 문제나 배경 설명)

          ### 핵심 내용 / 해결 방법
          (주요 내용을 구조적으로 정리)

          ### 키워드
          (쉼표로 구분된 핵심 키워드 목록)

          ### 참고 자료
          (이미지에 참고 링크나 출처가 있으면 기재, 없으면 "원본 이미지 참조")

          ## 🔗 Knowledge Connections
          (관련될 수 있는 지식 주제를 [[위키링크]] 형태로 3~5개 제안)

          중요:
          - 이미지에 텍스트가 있으면 정확히 읽어주세요. 표 형태라면 표 내용을 빠짐없이 포함해주세요.
          - filename 필드는 내용을 요약한 한국어 이름으로, 공백 대신 밑줄(_)을 쓰세요.
            예시: "AI이미지_부분수정_JSON프롬프트기법", "엑셀_셀병합_단축키_정리", "공자_논어_핵심명언"
          """

          def gemini_process(img_path, date_str, filename):
              """Send image to Gemini API and get structured document."""
              with open(img_path, "rb") as f:
                  img_b64 = base64.b64encode(f.read()).decode()

              ext = os.path.splitext(filename)[1].lower()
              mime_map = {".png": "image/png", ".jpg": "image/jpeg", ".jpeg": "image/jpeg", ".webp": "image/webp", ".bmp": "image/bmp"}
              mime = mime_map.get(ext, "image/png")

              prompt = PROMPT.replace("{date}", date_str).replace("{filename}", filename)

              payload = json.dumps({
                  "contents": [{
                      "parts": [
                          {"text": prompt},
                          {"inline_data": {"mime_type": mime, "data": img_b64}}
                      ]
                  }],
                  "generationConfig": {"temperature": 0.3, "maxOutputTokens": 4096}
              }).encode()

              req = Request(f"{API_URL}?key={API_KEY}", data=payload, headers={"Content-Type": "application/json"}, method="POST")

              try:
                  with urlopen(req, timeout=60) as resp:
                      result = json.loads(resp.read().decode())
                      text = result["candidates"][0]["content"]["parts"][0]["text"]
                      # Strip markdown code fences if Gemini wraps output
                      if text.startswith("```"):
                          lines = text.split("\n")
                          if lines[0].strip().startswith("```"):
                              lines = lines[1:]
                          if lines and lines[-1].strip() == "```":
                              lines = lines[:-1]
                          text = "\n".join(lines)
                      return text
              except Exception as e:
                  err_body = ''
                  if hasattr(e, 'read'):
                      try: err_body = e.read().decode()[:500]
                      except: pass
                  print(f"  ⚠️ Gemini API 실패: {e}")
                  if err_body:
                      print(f"  📋 응답: {err_body}")
                  return None

          def tesseract_fallback(img_path, date_str, filename):
              """Fallback to Tesseract OCR if Gemini fails."""
              try:
                  result = subprocess.run(["tesseract", img_path, "stdout", "-l", "kor+eng", "--psm", "3"],
                                          capture_output=True, text=True, timeout=30)
                  ocr_text = result.stdout.strip() or "(이미지에서 텍스트를 추출하지 못했습니다)"
              except:
                  ocr_text = "(OCR 처리 실패)"

              file_base = os.path.splitext(filename)[0]
              return f"""---
          title: "{file_base}"
          date: "{date_str}"
          source: image-ocr-tesseract
          original_image: "{filename}"
          tags: [ocr, auto-generated]
          ---

          # {file_base}

          > 📷 원본 이미지: `{filename}`
          > 🤖 자동 추출 (Tesseract OCR) | {date_str}

          ---

          {ocr_text}
          """

          # Find all images without corresponding .md files
          images = []
          for ext in ["png", "jpg", "jpeg", "webp", "bmp"]:
              images.extend(glob.glob(f"00_Raw/**/*.{ext}", recursive=True))
              images.extend(glob.glob(f"00_Raw/**/*.{ext.upper()}", recursive=True))

          def extract_filename_from_md(content):
              """Extract filename field from Gemini-generated MD frontmatter."""
              import re as _re
              m = _re.search(r'filename:\s*["\']?([^"\']\S+)', content)
              if m:
                  name = m.group(1).strip().strip('"').strip("'")
                  # Clean up: remove spaces, ensure underscores
                  name = name.replace(' ', '_').replace('/', '_')
                  # Remove problematic chars
                  name = _re.sub(r'[<>:"/\\|?*]', '', name)
                  if name:
                      return name
              return None

          # Track existing MD files to avoid duplicates
          def get_existing_md_files(directory):
              return set(f for f in os.listdir(directory) if f.endswith('.md'))

          processed = 0
          for img_path in sorted(set(images)):
              img_dir = os.path.dirname(img_path)
              # Check if any MD references this image already
              filename = os.path.basename(img_path)
              already_has_md = False
              tesseract_md_path = None
              for existing_md in glob.glob(os.path.join(img_dir, '*.md')):
                  try:
                      with open(existing_md, 'r', encoding='utf-8') as _f:
                          head = _f.read(500)
                          if filename in head:
                              already_has_md = True
                              # Check if it was made by Tesseract (low quality)
                              if 'image-ocr-tesseract' in head and API_KEY:
                                  tesseract_md_path = existing_md
                              break
                  except:
                      pass
              # If Tesseract MD exists and we have Gemini key → re-process
              if tesseract_md_path:
                  print(f"♻️  Tesseract MD 발견, Gemini로 재처리: {filename}")
                  os.remove(tesseract_md_path)
                  already_has_md = False
              if already_has_md:
                  print(f"⏭️  Skip (MD exists): {filename}")
                  continue

              date_str = os.path.basename(img_dir)
              print(f"🔍 Processing: {img_path}")

              # Try Gemini first, fallback to Tesseract
              content = None
              if API_KEY:
                  content = gemini_process(img_path, date_str, filename)
                  if content:
                      print(f"  ✅ Gemini 문서화 완료")
                  time.sleep(2)  # Rate limit

              if not content:
                  content = tesseract_fallback(img_path, date_str, filename)
                  print(f"  ⚠️ Tesseract 폴백 사용")

              # Extract descriptive filename from Gemini output
              desc_name = extract_filename_from_md(content) if content else None
              if desc_name:
                  md_filename = f"{desc_name}.md"
              else:
                  md_filename = os.path.splitext(filename)[0] + ".md"

              md_path = os.path.join(img_dir, md_filename)
              # Avoid overwrite
              if os.path.exists(md_path):
                  md_path = os.path.join(img_dir, os.path.splitext(filename)[0] + ".md")

              with open(md_path, "w", encoding="utf-8") as f:
                  f.write(content)
              print(f"  📝 Created: {os.path.basename(md_path)}")
              processed += 1

          print(f"\n✅ 총 {processed}개 이미지 문서화 완료")

      - name: "🏷️ 파일별 자동 카테고리 분류"
        shell: python3 {0}
        run: |
          import os, json, re

          CATEGORIES = {
              'AI공부': [
                  'ai', '프롬프트', 'gpt', '모델', '딥러닝', '머신러닝', 'llm',
                  'json', '이미지생성', '이미지 생성', '영상생성', '영상 생성',
                  'ocr', '인공지능', '자연어', '트랜스포머', '파인튜닝', '학습',
                  '신경망', 'prompt', 'gemini', 'claude', 'chatgpt', 'midjourney',
                  'stable diffusion', 'dall-e', 'sora', 'runway', 'pika',
                  '벡터', '임베딩', 'rag', '에이전트', 'agent', '웹생성', '앱생성',
                  '파이썬', 'python', '텐서', 'tensor', '뉴럴', 'neural',
                  '코파일럿', 'copilot', 'cursor', 'vibe coding', '바이브코딩',
                  'api', '자동화', 'automation', '코드', 'github', '배포',
                  '서버', '프론트', '백엔드', '프레임워크', '라이브러리',
                  'html', 'css', 'javascript', 'react', 'node', '개발',
                  '인포그래픽', '디자인', '위키', '데이터', '프로젝트'
              ],
              '회사': [
                  '회사', '업무', '회의', '보고', '기획', '매출', '인사',
                  '출근', '퇴근', '부서', '계약', '급여', '근무', '엑셀',
                  'excel', '클라이언트', '미팅', '제안서', '발표', '성과', '팀장',
                  '새마을금고', '금고', '은행', '금융', '대출', '예금',
                  '건설', '안전', '현장', '시공', '감리', '공사', '설계',
                  '산업안전', '안전교육', '품질'
              ],
              '좋은글': [
                  '명언', '동기부여', '글귀', '인생', '지혜', '용기',
                  '자기계발', '독서', '유명인사', '위인', '철학',
                  '공자', '소크라테스', '니체', '석가', '예수'
              ],
              '유튜브': [
                  '유튜브', 'youtube', 'shorts', '업로드', '채널', '구독',
                  '썸네일', '조회수', '알고리즘', '수익화', '크리에이터',
                  'mrbeast', '롱폼', '숏폼', '콘텐츠', '편집', '렌더링',
                  'luna_vault', '시네마그래프', '렌더러', '비트싱크',
                  'freedom grind', '영상편집', '프리미어', '어도비'
              ],
              '1인기업': [
                  '1인기업', '1인 기업', '창업', '사업', '수익', '부업',
                  '프리랜서', '마케팅', '브랜딩', '세금', '사업자등록',
                  '매출', '고객', '온라인사업', '스마트스토어', '쿠팡',
                  '전자상거래', '자영업'
              ],
              '운동': [
                  '운동', '헬스', '수영', '웨이트', '러닝', '달리기',
                  '근력', '유산소', '스트레칭', '피트니스', '체중',
                  '다이어트', '벤치프레스', '스쿼트', '데드리프트', '크로스핏'
              ],
              '육아': [
                  '육아', '아기', '아이', '추억', '돌잔치', '기저귀',
                  '이유식', '놀이', '어린이집', '유치원', '성장',
                  '딸', '아들', '태어', '출산'
              ],
          }

          def classify_file(fname, content=''):
              text = (fname + ' ' + content).lower()
              scores = {}
              for cat, keywords in CATEGORIES.items():
                  score = sum(1 for kw in keywords if kw.lower() in text)
                  if score > 0:
                      scores[cat] = score
              if not scores:
                  return '기타'
              return max(scores, key=scores.get)

          cat_path = '00_Raw/_categories.json'

          # Always rebuild from scratch to avoid stale/wrong categories
          cat_data = {}

          raw_dir = '00_Raw'
          for entry in sorted(os.listdir(raw_dir)):
              full = os.path.join(raw_dir, entry)
              if not os.path.isdir(full) or not re.match(r'\d{4}-\d{2}-\d{2}', entry):
                  continue

              cat_data[entry] = {}
              # First pass: classify MD files and track image-to-category mapping
              img_cat_map = {}  # image_filename -> category

              for fname in os.listdir(full):
                  if fname.startswith('_') or fname.startswith('.') or fname == 'README.md':
                      continue
                  if not fname.endswith('.md'):
                      continue

                  content = ''
                  fpath = os.path.join(full, fname)
                  try:
                      with open(fpath, 'r', encoding='utf-8') as f:
                          content = f.read()
                  except:
                      pass

                  cat = classify_file(fname, content)
                  if cat not in cat_data[entry]:
                      cat_data[entry][cat] = []
                  cat_data[entry][cat].append(fname)

                  # Track original image → same category
                  m = re.search(r'original_image:\s*["\']?([^"\']\S+)', content)
                  if m:
                      orig_img = m.group(1).strip().strip('"').strip("'")
                      if orig_img:
                          img_cat_map[orig_img] = cat

              # Second pass: add image/other files using mapped category
              for fname in os.listdir(full):
                  if fname.startswith('_') or fname.startswith('.') or fname == 'README.md':
                      continue
                  if fname.endswith('.md'):
                      continue  # Already processed

                  # Use category from paired MD, or classify by filename
                  cat = img_cat_map.get(fname, classify_file(fname, ''))
                  if cat not in cat_data[entry]:
                      cat_data[entry][cat] = []
                  cat_data[entry][cat].append(fname)

              # Remove empty dates
              if not cat_data[entry]:
                  del cat_data[entry]

          with open(cat_path, 'w', encoding='utf-8') as f:
              json.dump(cat_data, f, ensure_ascii=False, indent=2)

          print(f"✅ {len(cat_data)}개 날짜 파일별 카테고리 분류 완료")
          for date, cats in sorted(cat_data.items()):
              for c, files in cats.items():
                  print(f"  {date} [{c}] → {', '.join(files)}")

      - name: "🚀 Commit & Push"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          git config user.name "P-Reinforce Bot"
          git config user.email "bot@p-reinforce.local"
          
          # Add all generated files EXCEPT _categories.json
          git add -A -- ':!00_Raw/_categories.json'
          
          if git diff --cached --quiet; then
            echo "📭 No new documents to commit"
          else
            git commit -m "[P-Reinforce] 🧠 Gemini 지식 문서화"
          fi
          
          # Pull latest changes (may include deletions from web UI)
          git pull --no-rebase origin main --strategy-option=ours || {
            echo "⚠️ Pull conflict, aborting merge and retrying..."
            git merge --abort 2>/dev/null || true
            git pull --no-rebase origin main --strategy-option=theirs || true
          }
          
          # NOW regenerate _categories.json from the merged state
          python3 << 'PYEOF'
          import os, json, re
          CATEGORIES = {
              'AI공부': ['ai','gpt','chatgpt','gemini','claude','llm','프롬프트','prompt','이미지생성','영상생성','stable diffusion','midjourney','api','모델','rag','벡터','임베딩','에이전트','agent','자동화','automation','파이프라인','렌더','render','ocr','위키','wiki','vibe coding','바이브코딩','cursor','copilot','code','코딩','json','debug','script','python','스크립트','html','프롬프트기법','프레임워크','라이브러리','인포그래픽','데이터','프로젝트','웹생성','앱생성'],
              '회사': ['엑셀','excel','보고서','보고','건설','안전','시공','공사','설계','감리','인허가','계약','발주','입찰','견적','업무','회의','결재','기안','품의','csi','새마을금고','공문','직장','qr','가이드','guide','infographic','result_guide'],
              '좋은글': ['명언','인용','quote','좋은글','명상','동기부여','자기계발','독서','인사이트','지혜','철학'],
              '유튜브': ['youtube','유튜브','shorts','구독','조회수','알고리즘','mrbeast','채널','channel','업로드','upload','영상편집','freedom grind','luna_vault','onia','콘텐츠','content','ctr','lofi','비트','beat','phonk'],
              '1인기업': ['1인기업','사업','창업','수익','부업','프리랜서','마케팅','브랜딩','개인사업','소득','투잡'],
              '운동': ['헬스','운동','수영','달리기','웨이트','근력','스트레칭','다이어트','체중','피트니스','gym','workout'],
              '육아': ['아기','육아','아이','유아','돌봄','추억','성장','양육','부모','가족','태교']
          }
          def classify(fn, ct=''):
              t = (fn + ' ' + ct).lower()
              s = {}
              for c, kws in CATEGORIES.items():
                  sc = sum(1 for k in kws if k.lower() in t)
                  if sc > 0: s[c] = sc
              return max(s, key=s.get) if s else '기타'
          
          raw = '00_Raw'; d = {}
          for e in sorted(os.listdir(raw)):
              fp = os.path.join(raw, e)
              if not os.path.isdir(fp) or not re.match(r'\d{4}-\d{2}-\d{2}', e): continue
              d[e] = {}; img_map = {}
              for fn in sorted(os.listdir(fp)):
                  if fn.startswith('_') or fn.startswith('.') or fn == 'README.md': continue
                  if not fn.endswith('.md'): continue
                  ct = ''
                  try:
                      with open(os.path.join(fp, fn), 'r', encoding='utf-8') as f: ct = f.read()
                  except: pass
                  c = classify(fn, ct)
                  if c not in d[e]: d[e][c] = []
                  d[e][c].append(fn)
                  m = re.search(r'original_image:\s*"?([^"\s]+)', ct)
                  if m: img_map[m.group(1).strip()] = c
              for fn in sorted(os.listdir(fp)):
                  if fn.startswith('_') or fn.startswith('.') or fn == 'README.md' or fn.endswith('.md'): continue
                  c = img_map.get(fn, classify(fn, ''))
                  if c not in d[e]: d[e][c] = []
                  d[e][c].append(fn)
              if not d[e]: del d[e]
          with open(os.path.join(raw, '_categories.json'), 'w', encoding='utf-8') as f:
              json.dump(d, f, ensure_ascii=False, indent=2)
          # Validate
          with open(os.path.join(raw, '_categories.json'), 'r') as f:
              json.load(f)
          print(f'✅ _categories.json rebuilt: {len(d)} dates')
          PYEOF
          
          # Commit the fresh _categories.json
          git add 00_Raw/_categories.json
          git diff --cached --quiet || git commit -m "[P-Reinforce] 🏷️ 카테고리 분류"
          
          # Push with retry
          for i in 1 2 3; do
            git push && echo "🚀 Push complete!" && break
            echo "⚠️ Push failed, retrying ($i/3)..."
            git pull --no-rebase origin main --strategy-option=ours || true
            sleep 2
          done

      - name: "🔔 실패 알림"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toLocaleString('ko-KR', {timeZone:'Asia/Seoul'});
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            // Create a GitHub Issue as notification
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 [P-Reinforce] OCR 자동 문서화 실패 - ${now}`,
              body: `## ❌ 워크플로우 실패 알림\n\n` +
                    `| 항목 | 내용 |\n|------|------|\n` +
                    `| ⏰ 시간 | ${now} |\n` +
                    `| 🔗 로그 | [확인하기](${runUrl}) |\n` +
                    `| 🏃 Run ID | ${context.runId} |\n\n` +
                    `자동으로 생성된 알림입니다. 로그를 확인하고 문제를 해결해주세요.`,
              labels: ['bug', 'automated']
            });
            
            // Also update _categories.json with error status
            const path = '00_Raw/_categories.json';
            let sha, content;
            try {
              const file = await github.rest.repos.getContent({
                owner: context.repo.owner, repo: context.repo.repo,
                path, ref: 'main'
              });
              sha = file.data.sha;
              content = JSON.parse(Buffer.from(file.data.content, 'base64').toString());
            } catch(e) { content = {}; }
            
            content._error = {
              time: now,
              message: 'OCR 자동 문서화 실패',
              runUrl: runUrl
            };
            
            const encoded = Buffer.from(JSON.stringify(content, null, 2)).toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo,
              path, message: '[P-Reinforce] ⚠️ 워크플로우 실패 알림',
              content: encoded, branch: 'main', ...(sha ? {sha} : {})
            });
